<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review-It | 관리자 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      /* 깊이감 있는 프리미엄 블랙 */
      color: #fff;
    }

    .logo-text {
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
    }

    .input-field {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: #2563eb;
      /* 집중되었을 때 선명한 블루 */
      background: rgba(255, 255, 255, 0.05);
      outline: none;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.1);
    }

    .btn-submit {
      background: #ffffff;
      color: #000000;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      background: #f3f4f6;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
    }

    .fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">

  <div
    class="absolute top-[10%] left-[20%] w-[500px] h-[500px] bg-blue-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10 pointer-events-none">
  </div>
  <div
    class="absolute bottom-[10%] right-[20%] w-[500px] h-[500px] bg-purple-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10 pointer-events-none">
  </div>

  <div class="z-10 w-full max-w-[400px] fade-in-up">

    <div class="text-center mb-8">
      <h1 class="text-4xl logo-text tracking-tighter mb-2">REVIEW-IT</h1>
      <p class="text-gray-400 text-sm font-medium tracking-wide">리뷰 자동화 어드민 센터</p>
    </div>

    <div class="login-box rounded-2xl p-8 shadow-2xl">

      <form id="auth-form" onsubmit="handleAuthSubmit(event)" class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wide">Cafe24 쇼핑몰 아이디</label>
          <input type="text" id="mall-id-input" required placeholder="쇼핑몰 아이디를 입력해주세요"
            class="input-field w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-600 font-medium">
        </div>

        <button type="submit"
          class="btn-submit w-full py-3.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 mt-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z"
              fill="currentColor" />
            <path d="M11 7H13V13H11V7Z" fill="currentColor" />
            <path d="M11 15H13V17H11V15Z" fill="currentColor" />
          </svg>
          Cafe24로 시작하기
        </button>
      </form>

    </div>

    <p class="text-center text-[11px] text-gray-600 mt-6 font-medium">
      &copy; 2026 REVIEW-IT. All rights reserved.
    </p>
  </div>

  <script>
    // 페이지 로드 시 URL에 쿼리스트링이 있다면 (카페24를 통해 들어온 경우) 통째로 넘김
    window.onload = () => {
      if (window.location.search.includes('mall_id')) {
        // 기존: /api/auth?mall_id=xxx
        // 변경: /api/auth?mall_id=xxx&hmac=yyy&timestamp=zzz (전부 다 넘김)
        window.location.href = `/api/auth${window.location.search}`;
      }
    };

    // 수동 진입용
    function handleAuthSubmit(event) {
      event.preventDefault();
      const mallId = document.getElementById('mall-id-input').value.trim();
      if (mallId) {
        window.location.href = `/api/auth?mall_id=${mallId}`;
      }
    }
  </script>
</body>

</html>
