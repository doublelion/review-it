<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review-It | 관리자 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      /* 깊이감 있는 블랙 */
      color: #fff;
    }

    .logo-text {
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
    }

    .input-field {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: #3b82f6;
      /* Blue-500 */
      background: rgba(255, 255, 255, 0.05);
      outline: none;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-cafe24 {
      background: #ffffff;
      color: #000000;
      transition: all 0.2s;
    }

    .btn-cafe24:hover {
      background: #f3f4f6;
      transform: translateY(-1px);
    }

    .fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">

  <div
    class="absolute top-[10%] left-[20%] w-[500px] h-[500px] bg-blue-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10 pointer-events-none">
  </div>
  <div
    class="absolute bottom-[10%] right-[20%] w-[500px] h-[500px] bg-purple-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10 pointer-events-none">
  </div>

  <div class="z-10 w-full max-w-[420px] fade-in-up">

    <div class="text-center mb-8">
      <h1 class="text-4xl logo-text tracking-tighter mb-2">REVIEW-IT</h1>
      <p class="text-gray-400 text-sm font-medium">리뷰잇 관리자센터 로그인</p>
    </div>

    <div class="login-box rounded-2xl p-8 shadow-2xl">

      <form onsubmit="event.preventDefault(); alert('현재는 카페24 연동 로그인만 지원합니다.');" class="space-y-4 mb-6">
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-1.5 uppercase tracking-wide">이메일 주소</label>
          <input type="email" placeholder="이메일을 입력해주세요"
            class="input-field w-full px-4 py-3 rounded-lg text-sm placeholder-gray-600">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-1.5 uppercase tracking-wide">비밀번호</label>
          <input type="password" placeholder="비밀번호를 입력해주세요"
            class="input-field w-full px-4 py-3 rounded-lg text-sm placeholder-gray-600">
        </div>
        <button type="submit"
          class="btn-primary w-full py-3.5 rounded-lg font-bold text-sm mt-2 shadow-lg shadow-blue-500/20">
          이메일로 로그인
        </button>
      </form>

      <div class="flex justify-center items-center gap-4 text-xs text-gray-400 mb-6">
        <a href="#" class="hover:text-white transition">비밀번호 찾기</a>
        <span class="w-[1px] h-3 bg-gray-700"></span>
        <a href="#" class="hover:text-white transition">서비스 가입하기</a>
      </div>

      <div class="relative flex py-2 items-center mb-6">
        <div class="flex-grow border-t border-gray-700/50"></div>
        <span class="flex-shrink-0 mx-4 text-gray-500 text-xs">또는 간편 로그인</span>
        <div class="flex-grow border-t border-gray-700/50"></div>
      </div>

      <button onclick="startCafe24Auth()"
        class="btn-cafe24 w-full py-3.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2 shadow-lg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z"
            fill="currentColor" />
          <path d="M11 7H13V13H11V7Z" fill="currentColor" />
          <path d="M11 15H13V17H11V15Z" fill="currentColor" />
        </svg>
        Cafe24 계정으로 시작하기
      </button>

    </div>
    <p class="text-center text-[11px] text-gray-600 mt-6 font-medium">
      &copy; 2024 REVIEW-IT. All rights reserved.
    </p>
  </div>

  <script>
    function startCafe24Auth() {
      const params = new URLSearchParams(window.location.search);
      const mallId = params.get('mall_id');

      if (!mallId) {
        // 이전에 작업한 테스트용 프롬프트 로직
        const inputMallId = prompt("카페24 쇼핑몰 아이디를 입력해주세요.\n(개발 테스트용)");
        if (inputMallId) {
          window.location.href = `/api/auth?mall_id=${inputMallId}`;
        }
      } else {
        window.location.href = `/api/auth?mall_id=${mallId}`;
      }
    }
  </script>
</body>

</html>
